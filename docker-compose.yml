version: '3.9'

services:

  # ─── MongoDB ───
  mongo:
    image: mongo:7
    container_name: pv-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: peacevision
    networks:
      - pv-network

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pv-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/peacevision
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_GUIDANCE_PRICE_ID: ${STRIPE_GUIDANCE_PRICE_ID}
      STRIPE_HEALING_PRICE_ID: ${STRIPE_HEALING_PRICE_ID}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - mongo
    networks:
      - pv-network

  # ─── Nginx (serves frontend + proxies /api to backend) ───
  nginx:
    image: nginx:alpine
    container_name: pv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # put your SSL certs here
    depends_on:
      - backend
    networks:
      - pv-network

volumes:
  mongo_data:

networks:
  pv-network:
    driver: bridge